<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colourflex Inks & Coatings | Leading Ink Manufacturer in Tanzania</title>
  <meta name="description"
    content="Colourflex Inks & Coatings Ltd. - Premium flexographic, gravure, and screen printing ink manufacturing in Dar es Salaam, Tanzania. Serving East Africa with quality solutions." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#111111', // Rich Black (Key)
              primary: '#007fb1', // Cyan (Contrast Optimized for WCAG AA)
              magenta: '#EC008C', // Magenta (Process Pink from Logo)
              yellow: '#FFF200', // Yellow (Process Yellow from Logo)
              accent: '#94a3b8', // Slate 400 for neutral text
              light: '#f8fafc', // Slate 50
            }
          },
          fontFamily: {
            sans: ['"Google Sans"', 'sans-serif'],
            serif: ['"Google Sans"', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'glow': '0 0 20px rgba(0, 159, 227, 0.4)',
            'premium': '0 20px 40px -4px rgba(0, 0, 0, 0.1), 0 8px 16px -4px rgba(0, 0, 0, 0.05)',
          },
          backdropBlur: {
            'glass': '12px',
          }
        }
      }
    }
  </script>
  <style>
    /* Smooth scrolling for anchor links */
    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #f8fafc;
      font-feature-settings: "cv11", "ss01";
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Fallback for browsers that don't support backdrop-filter */
    @supports not (backdrop-filter: blur(1px)) {
      .glass-container {
        background: rgba(255, 255, 255, 0.1);
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
